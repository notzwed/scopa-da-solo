<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="felt-base" x1="0" y1="0" x2="1" y2="0.55">
      <stop offset="0%" stop-color="#194d2d"/>
      <stop offset="50%" stop-color="#18492b"/>
      <stop offset="100%" stop-color="#143e25"/>
    </linearGradient>
    <filter id="felt-noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.9"
        numOctaves="5"
        seed="27"
        result="noise"
      />
      <feColorMatrix
        in="noise"
        type="matrix"
        values="
          0 0 0 0 0.11
          0 0 0 0 0.22
          0 0 0 0 0.13
          0 0 0 0.18 0
        "
        result="green-noise"
      />
      <feBlend in="SourceGraphic" in2="green-noise" mode="soft-light"/>
    </filter>
    <filter id="felt-fibers" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.015 0.85"
        numOctaves="3"
        seed="14"
        result="fibers"
      />
      <feColorMatrix
        in="fibers"
        type="matrix"
        values="
          0 0 0 0 0.92
          0 0 0 0 0.96
          0 0 0 0 0.9
          0 0 0 0.045 0
        "
        result="fiber-tint"
      />
      <feGaussianBlur in="fiber-tint" stdDeviation="0.22"/>
    </filter>
    <radialGradient id="felt-shade" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.028"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.14"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#felt-base)"/>
  <rect width="1600" height="900" fill="url(#felt-base)" filter="url(#felt-noise)"/>
  <rect width="1600" height="900" fill="#ffffff" filter="url(#felt-fibers)" opacity="0.82"/>
  <rect width="1600" height="900" fill="url(#felt-shade)"/>
</svg>
